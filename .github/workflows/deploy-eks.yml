name: CI/CD DevSecOps to AWS EKS

on:
  push:
    branches: [ "master" ]

jobs:

  quality-and-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

# 1. Análisis de Calidad de Código (SonarCloud)
      - name: Build and Analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=ArukuKun_hsr-api -Dsonar.organization=arukukun -Dsonar.host.url=https://sonarcloud.io -DskipTests

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master
        
      - name: Run Snyk to check for vulnerabilities
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          chmod +x mvnw
          snyk test --severity-threshold=critical

  deploy:
    needs: quality-and-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4 
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: hsr-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update kubeconfig for EKS
        run: aws eks update-kubeconfig --region us-east-1 --name hsr-cluster

      - name: Deploy to AWS EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: hsr-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 1. Crear la base de datos y la API por primera vez en el clúster
          kubectl apply -f k8s/postgres.yaml  # <-- Ajusta 'k8s/' al nombre de tu carpeta
          kubectl apply -f k8s/api.yaml       # <-- Ajusta 'k8s/' al nombre de tu carpeta
          
          # 2. Actualiza el deployment con la imagen recién subida
          kubectl set image deployment/hsr-api-deployment hsr-api=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
Nota: Si tus archivos sí están sueltos en la carpeta principal y no los metiste en ningún